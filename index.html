<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لوحة تحكم الجراح</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Cairo", sans-serif;
}

body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    direction: rtl;
}

.container {
    padding: 30px;
}

h1 {
    text-align: center;
    margin-bottom: 30px;
}

.top-controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 30px;
}

input, button {
    padding: 10px;
    border-radius: 10px;
    border: none;
}

button {
    background: #6366f1;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #4f46e5;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

.timer {
    font-size: 60px;
    text-align: center;
    color: #6366f1;
    margin: 20px 0;
}

.actions {
    text-align: center;
}

.actions button {
    margin: 5px;
}

.small-boxes {
    display: flex;
    justify-content: space-around;
    margin-top: 20px;
}

.box {
    background: rgba(255,255,255,0.05);
    padding: 15px;
    border-radius: 15px;
    text-align: center;
}

.energy {
    margin-top: 15px;
    display: flex;
    gap: 10px;
}

.energy div {
    flex: 1;
    background: #0f172a;
    padding: 10px;
    border-radius: 10px;
    text-align: center;
}
</style>

</head>

<body>

<div class="container">

<h1>🩺 لوحة تحكم الجراح</h1>

<div class="top-controls">
    <input type="number" id="minutes" value="25">
    <input type="color" id="color" value="#6366f1">
    <button onclick="applySettings()">تأكيد</button>
</div>

<div class="grid">

    <!-- Timer -->
    <div class="card">
        <div class="timer" id="timer">25:00</div>
        <div class="actions">
            <button onclick="startTimer()">ابدأ المهمة</button>
            <button onclick="resetTimer()">إعادة ضبط</button>
        </div>
    </div>

    <!-- Graduation -->
    <div class="card">
        <h3>🎓 حلم التخرج</h3>
        <div class="small-boxes">
            <div class="box">
                <h2 id="years">0</h2>
                <p>سنة</p>
            </div>
            <div class="box">
                <h2 id="days">0</h2>
                <p>يوم</p>
            </div>
            <div class="box">
                <h2 id="hours">0</h2>
                <p>ساعة</p>
            </div>
        </div>

        <div class="energy">
            <div>5 دق = 75⚡</div>
            <div>10 دق = 150⚡</div>
            <div>15 دق = 225⚡</div>
        </div>
    </div>

</div>

</div>

<script>
let time = 1500;
let interval;

function updateTimer() {
    let m = Math.floor(time / 60);
    let s = time % 60;
    document.getElementById("timer").innerText =
        `${m}:${s < 10 ? "0" : ""}${s}`;
}

function startTimer() {
    if (interval) return;

    interval = setInterval(() => {
        if (time > 0) {
            time--;
            updateTimer();
        } else {
            clearInterval(interval);
            alert("خلص الوقت 🔥");
        }
    }, 1000);
}

function resetTimer() {
    clearInterval(interval);
    interval = null;
    time = parseInt(document.getElementById("minutes").value) * 60;
    updateTimer();
}

function applySettings() {
    let min = document.getElementById("minutes").value;
    let color = document.getElementById("color").value;

    time = min * 60;
    document.querySelector(".timer").style.color = color;
    updateTimer();
}

// حساب التخرج (مثال: 2036)
let target = new Date("2036-01-01");

function updateCountdown() {
    let now = new Date();
    let diff = target - now;

    let years = Math.floor(diff / (1000*60*60*24*365));
    let days = Math.floor(diff / (1000*60*60*24)) % 365;
    let hours = Math.floor(diff / (1000*60*60)) % 24;

    document.getElementById("years").innerText = years;
    document.getElementById("days").innerText = days;
    document.getElementById("hours").innerText = hours;
}

setInterval(updateCountdown, 1000);
updateTimer();
</script>

</body>
</html>
