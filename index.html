<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Dashboard Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Cairo', sans-serif;
}

body {
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
    direction: rtl;
}

/* Layout */
.container {
    padding: 40px;
}

.header {
    text-align: center;
    margin-bottom: 30px;
    font-size: 28px;
}

/* Controls */
.controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 30px;
}

input {
    background: rgba(255,255,255,0.08);
    border: none;
    padding: 10px;
    border-radius: 12px;
    color: white;
}

button {
    padding: 10px 20px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(45deg,#6366f1,#4f46e5);
    color: white;
    cursor: pointer;
    transition: 0.3s;
    position: relative;
    overflow: hidden;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(99,102,241,0.4);
}

/* Cards */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border-radius: 25px;
    padding: 30px;
    box-shadow: inset 0 0 1px rgba(255,255,255,0.2),
                0 20px 40px rgba(0,0,0,0.6);
    transition: 0.4s;
}

.card:hover {
    transform: translateY(-8px) scale(1.01);
}

/* Timer */
.timer {
    font-size: 72px;
    text-align: center;
    color: #6366f1;
    margin: 20px 0;
    letter-spacing: 2px;
}

/* Actions */
.actions {
    text-align: center;
}

/* Graduation */
.stats {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
}

.stat {
    background: rgba(255,255,255,0.05);
    padding: 15px;
    border-radius: 15px;
    width: 30%;
    text-align: center;
    transition: 0.3s;
}

.stat:hover {
    background: #6366f1;
}

/* Energy */
.energy {
    margin-top: 20px;
    display: flex;
    gap: 10px;
}

.energy div {
    flex: 1;
    padding: 10px;
    border-radius: 12px;
    background: rgba(99,102,241,0.2);
    text-align: center;
    transition: 0.3s;
}

.energy div:hover {
    background: #6366f1;
}

/* Smooth appear */
.card {
    opacity: 0;
    transform: translateY(30px);
    animation: fade 0.8s forwards;
}

.card:nth-child(2) {
    animation-delay: 0.2s;
}

@keyframes fade {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<div class="container">

<div class="header">🩺 لوحة تحكم الجراح</div>

<div class="controls">
    <input type="number" id="min" value="25">
    <input type="color" id="color" value="#6366f1">
    <button onclick="apply()">تأكيد</button>
</div>

<div class="grid">

    <!-- Timer -->
    <div class="card">
        <div class="timer" id="timer">25:00</div>
        <div class="actions">
            <button onclick="start()">ابدأ</button>
            <button onclick="reset()">إعادة</button>
        </div>
    </div>

    <!-- Graduation -->
    <div class="card">
        <h3>🎓 حلم التخرج</h3>

        <div class="stats">
            <div class="stat"><h2 id="y">0</h2><p>سنة</p></div>
            <div class="stat"><h2 id="d">0</h2><p>يوم</p></div>
            <div class="stat"><h2 id="h">0</h2><p>ساعة</p></div>
        </div>

        <div class="energy">
            <div>5د = 75⚡</div>
            <div>10د = 150⚡</div>
            <div>15د = 225⚡</div>
        </div>
    </div>

</div>

</div>

<script>
let time = 1500;
let run;

function update() {
    let m = Math.floor(time/60);
    let s = time%60;
    document.getElementById("timer").innerText =
        `${m}:${s<10?"0":""}${s}`;
}

function start() {
    if(run) return;
    run = setInterval(()=>{
        if(time>0){
            time--;
            update();
        } else {
            clearInterval(run);
        }
    },1000);
}

function reset(){
    clearInterval(run);
    run = null;
    time = document.getElementById("min").value*60;
    update();
}

function apply(){
    document.querySelector(".timer").style.color =
        document.getElementById("color").value;
}

// countdown
let target = new Date("2036-01-01");

setInterval(()=>{
    let diff = target - new Date();
    let y = Math.floor(diff/(1000*60*60*24*365));
    let d = Math.floor(diff/(1000*60*60*24))%365;
    let h = Math.floor(diff/(1000*60*60))%24;

    yElem = document.getElementById("y");
    dElem = document.getElementById("d");
    hElem = document.getElementById("h");

    yElem.innerText = y;
    dElem.innerText = d;
    hElem.innerText = h;
},1000);

update();
</script>

</body>
</html>
