<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لوحة تحكم الجراح</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;600&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Cairo', sans-serif;
}

body {
    background: radial-gradient(circle at top, #1e293b, #020617);
    color: white;
    direction: rtl;
    min-height: 100vh;
    overflow-x: hidden;
}

/* خلفية متحركة */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: linear-gradient(45deg, #6366f1, #0ea5e9, #9333ea);
    animation: moveBg 10s linear infinite;
    opacity: 0.08;
}

@keyframes moveBg {
    0% { transform: translate(0,0); }
    100% { transform: translate(-50%, -50%); }
}

.container {
    padding: 30px;
    position: relative;
    z-index: 2;
}

h1 {
    text-align: center;
    margin-bottom: 30px;
    font-size: 32px;
}

/* إعدادات */
.controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 30px;
}

input, button {
    padding: 10px;
    border-radius: 12px;
    border: none;
}

input {
    background: rgba(255,255,255,0.1);
    color: white;
}

button {
    background: linear-gradient(45deg,#6366f1,#4f46e5);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #6366f1;
}

/* Grid */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

/* Card */
.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

/* Timer */
.timer {
    font-size: 70px;
    text-align: center;
    color: #6366f1;
    margin: 20px 0;
    transition: 0.3s;
}

/* Buttons */
.actions {
    text-align: center;
}

/* Graduation */
.boxes {
    display: flex;
    justify-content: space-around;
    margin-top: 20px;
}

.box {
    background: rgba(255,255,255,0.08);
    padding: 15px;
    border-radius: 15px;
    text-align: center;
    transition: 0.3s;
}

.box:hover {
    background: #6366f1;
}

/* Energy */
.energy {
    margin-top: 20px;
    display: flex;
    gap: 10px;
}

.energy div {
    flex: 1;
    background: rgba(99,102,241,0.2);
    padding: 10px;
    border-radius: 10px;
    text-align: center;
    transition: 0.3s;
}

.energy div:hover {
    background: #6366f1;
}
</style>

</head>

<body>

<div class="container">

<h1>🩺 لوحة تحكم الجراح</h1>

<div class="controls">
    <input type="number" id="minutes" value="25">
    <input type="color" id="color" value="#6366f1">
    <button onclick="applySettings()">تأكيد</button>
</div>

<div class="grid">

    <!-- Timer -->
    <div class="card">
        <div class="timer" id="timer">25:00</div>
        <div class="actions">
            <button onclick="startTimer()">ابدأ</button>
            <button onclick="resetTimer()">إعادة</button>
        </div>
    </div>

    <!-- Graduation -->
    <div class="card">
        <h3>🎓 حلم التخرج</h3>

        <div class="boxes">
            <div class="box">
                <h2 id="years">0</h2>
                <p>سنة</p>
            </div>
            <div class="box">
                <h2 id="days">0</h2>
                <p>يوم</p>
            </div>
            <div class="box">
                <h2 id="hours">0</h2>
                <p>ساعة</p>
            </div>
        </div>

        <div class="energy">
            <div>5 دق = 75⚡</div>
            <div>10 دق = 150⚡</div>
            <div>15 دق = 225⚡</div>
        </div>

    </div>

</div>

</div>

<script>
let time = 1500;
let interval;

function updateTimer() {
    let m = Math.floor(time / 60);
    let s = time % 60;
    document.getElementById("timer").innerText =
        `${m}:${s < 10 ? "0" : ""}${s}`;
}

function startTimer() {
    if (interval) return;

    interval = setInterval(() => {
        if (time > 0) {
            time--;
            updateTimer();
        } else {
            clearInterval(interval);
            alert("🔥 خلص الوقت");
        }
    }, 1000);
}

function resetTimer() {
    clearInterval(interval);
    interval = null;
    time = document.getElementById("minutes").value * 60;
    updateTimer();
}

function applySettings() {
    let color = document.getElementById("color").value;
    document.querySelector(".timer").style.color = color;
}

// عداد التخرج
let target = new Date("2036-01-01");

function updateCountdown() {
    let now = new Date();
    let diff = target - now;

    let y = Math.floor(diff / (1000*60*60*24*365));
    let d = Math.floor(diff / (1000*60*60*24)) % 365;
    let h = Math.floor(diff / (1000*60*60)) % 24;

    document.getElementById("years").innerText = y;
    document.getElementById("days").innerText = d;
    document.getElementById("hours").innerText = h;
}

setInterval(updateCountdown, 1000);
updateTimer();
</script>

</body>
</html>
